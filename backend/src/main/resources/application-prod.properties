# Production profile. Activate with SPRING_PROFILES_ACTIVE=prod.
# All secrets/credentials come from the environment (see base application.properties).

# Schema is owned by Flyway; Hibernate only validates the mapping.
spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=true

# Never expose OTPs; quiet SQL and security debug logging in production.
otp.expose-in-response=false
spring.jpa.show-sql=false
logging.level.org.springframework.security=WARN

# Mail (Gmail SMTP) — all values from the environment, no committed defaults.
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${GMAIL_USERNAME}
spring.mail.password=${GMAIL_APP_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Redis (Upstash) — TTL store for registration OTP + MFA temp tokens
spring.data.redis.url=${REDIS_URL}

# Supabase Storage — owner business documents
supabase.url=${SUPABASE_URL}
supabase.service-key=${SUPABASE_SERVICE_KEY}
supabase.bucket=${SUPABASE_BUCKET:business-documents}

# OTP / MFA
app.auth.otp-expiration-minutes=${OTP_EXPIRATION_MINUTES:5}
app.auth.mfa-enabled=${MFA_ENABLED:true}
