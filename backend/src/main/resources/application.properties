spring.application.name=ev-project

server.port=8080
server.address=0.0.0.0

spring.profiles.active=dev

# Database Configuration (Supabase PostgreSQL)
# All credentials are supplied via the environment. No defaults: the app
# fails fast if these are unset, so no secret is ever committed.
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
# spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true

# JWT Configuration
# No default: JWT_SECRET must be supplied via the environment. The app fails
# fast on startup if it is missing, so a public/committed key can never be used.
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:3600000}

# OTP delivery: never expose the OTP in API responses by default.
# Overridden to true only in the dev profile for local testing.
otp.expose-in-response=false

# Razorpay Configuration (supplied via env in all real environments; dev overrides locally)
razorpay.key.id=${RAZORPAY_KEY_ID}
razorpay.key.secret=${RAZORPAY_KEY_SECRET}

# Logging
logging.level.org.springframework.security=DEBUG

# Response Compression (GZIP)
server.compression.enabled=true
server.compression.mime-types=application/json,text/html,text/plain
server.compression.min-response-size=1024

spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Kolkata
spring.jackson.time-zone=Asia/Kolkata
spring.jackson.serialization.write-dates-as-timestamps=false
