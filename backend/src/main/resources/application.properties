spring.application.name=ev-project

server.port=8080
server.address=0.0.0.0

spring.profiles.active=dev

# Database Configuration (Supabase PostgreSQL)
spring.datasource.url=DB_URL
spring.datasource.username=DB_USERNAME
spring.datasource.password=DB_PASSWORD
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
# spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true

# JWT Configuration
jwt.secret=${JWT_SECRET:mySecretKeyForEVChargingApp2024ThatShouldBeAtLeast256BitsLongForSecurity}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Stripe Configuration
stripe.api.key=${STRIPE_API_KEY:sk_test_your_stripe_secret_key}
stripe.webhook.secret=${STRIPE_WEBHOOK_SECRET:whsec_your_webhook_secret}

# Logging
logging.level.org.springframework.security=DEBUG

# Response Compression (GZIP)
server.compression.enabled=true
server.compression.mime-types=application/json,text/html,text/plain
server.compression.min-response-size=1024
