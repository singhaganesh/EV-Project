spring.application.name=ev-project

server.port=8080
server.address=0.0.0.0

# Default to dev locally; prod sets SPRING_PROFILES_ACTIVE=prod (which excludes
# the dev profile and its OTP-exposure / local secrets).
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# Database Configuration (Supabase PostgreSQL)
# All credentials are supplied via the environment. No defaults: the app
# fails fast if these are unset, so no secret is ever committed.
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Cap how long a transaction will wait on a row lock so a hung booking txn
# can't block others indefinitely. (On the Supabase transaction-mode pooler,
# also pass options=-c%20lock_timeout%3D5000 on DB_URL for guaranteed effect.)
spring.datasource.hikari.connection-init-sql=SET lock_timeout = '5s'

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Flyway DB migrations.
# DISABLED by default so migrations never auto-run against an existing DB.
# To adopt: review db/migration scripts, set spring.flyway.enabled=true (it will
# baseline the current schema at V1 and apply V2+), then switch ddl-auto=validate.
spring.flyway.enabled=false
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true

# JWT Configuration
# No default: JWT_SECRET must be supplied via the environment. The app fails
# fast on startup if it is missing, so a public/committed key can never be used.
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:604800000}

# OTP delivery: never expose the OTP in API responses by default.
# Overridden to true only in the dev profile for local testing.
otp.expose-in-response=false

# Razorpay Configuration (supplied via env in all real environments; dev overrides locally)
razorpay.key.id=${RAZORPAY_KEY_ID}
razorpay.key.secret=${RAZORPAY_KEY_SECRET}

# Firebase Cloud Messaging (server push). Point this at a Firebase service-account
# JSON to enable push. If unset/blank, FCM is disabled and pushes are skipped —
# the app still boots and every endpoint works (tokens are still stored).
fcm.credentials-path=${FCM_CREDENTIALS_PATH:}

# Logging
logging.level.org.springframework.security=DEBUG

# Response Compression (GZIP)
server.compression.enabled=true
server.compression.mime-types=application/json,text/html,text/plain
server.compression.min-response-size=1024

spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Kolkata
spring.jackson.time-zone=Asia/Kolkata
spring.jackson.serialization.write-dates-as-timestamps=false
